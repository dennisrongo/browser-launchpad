<!DOCTYPE html>
<html>
<head>
    <title>Feature #8, #11, #12 - Extension Build Test</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .test-pass { background: #d4edda; border-color: #c3e6cb; }
        .test-fail { background: #f8d7da; border-color: #f5c6cb; }
        .check-item { margin: 8px 0; }
        .check-pass::before { content: "CHECK PASS "; color: green; font-weight: bold; }
        .check-fail::before { content: "CHECK FAIL "; color: red; font-weight: bold; }
        iframe { width: 100%; height: 600px; border: 2px solid #333; border-radius: 8px; }
        .controls { margin: 20px 0; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-pass { background: #28a745; color: white; }
        .badge-fail { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Extension Core Features #8, #11, #12 Verification</h1>

    <div id="results"></div>

    <div class="test-section">
        <h2>Feature #8: React App Initialization Test</h2>
        <div id="react-tests"></div>
    </div>

    <div class="test-section">
        <h2>Feature #11: HMR Configuration Test</h2>
        <div id="hmr-tests"></div>
    </div>

    <div class="test-section">
        <h2>Feature #12: Build Process Test</h2>
        <div id="build-tests"></div>
    </div>

    <div class="test-section">
        <h2>Extension Preview (Production Build)</h2>
        <div class="controls">
            <button onclick="loadExtension()">Load Extension in iframe</button>
            <button onclick="checkConsole()">Check Console for Errors</button>
            <button onclick="testReactMount()">Test React Mount</button>
        </div>
        <iframe id="extension-frame" src="dist/newtab.html"></iframe>
        <div id="console-output"></div>
    </div>

    <script>
        const results = {
            feature8: [],
            feature11: [],
            feature12: []
        };

        // Feature #8: React App Initialization
        function testReactInitialization() {
            const tests = [
                {
                    name: '8.1: dist/newtab.html exists',
                    test: () => fetch('dist/newtab.html').then(r => r.ok).catch(() => false)
                },
                {
                    name: '8.2: dist/newtab.js bundle exists',
                    test: () => fetch('dist/newtab.js').then(r => r.ok).catch(() => false)
                },
                {
                    name: '8.3: dist/newtab.css exists',
                    test: () => fetch('dist/newtab.css').then(r => r.ok).catch(() => false)
                },
                {
                    name: '8.4: dist/manifest.json exists',
                    test: () => fetch('dist/manifest.json').then(r => r.ok).catch(() => false)
                },
                {
                    name: '8.5: Bundle contains React',
                    test: () => fetch('dist/newtab.js').then(r => r.text()).then(content => content.includes('React'))
                },
                {
                    name: '8.6: Bundle size < 300KB',
                    test: () => fetch('dist/newtab.js').then(r => r.text().then(text => text.length < 300000))
                },
                {
                    name: '8.7: HTML has root div',
                    test: () => fetch('dist/newtab.html').then(r => r.text()).then(html => html.includes('id="root"'))
                },
                {
                    name: '8.8: Script module loading',
                    test: () => fetch('dist/newtab.html').then(r => r.text()).then(html => html.includes('type="module"'))
                }
            ];

            return Promise.all(tests.map(async t => {
                const pass = await t.test();
                results.feature8.push({ name: t.name, pass });
                return { name: t.name, pass };
            }));
        }

        // Feature #11: HMR Configuration
        function testHMRConfiguration() {
            const tests = [
                {
                    name: '11.1: Vite config exists',
                    test: () => fetch('vite.config.ts').then(r => r.ok).catch(() => fetch('vite.config.js').then(r => r.ok).catch(() => false))
                },
                {
                    name: '11.2: Dev script in package.json',
                    test: () => fetch('package.json').then(r => r.json()).then(pkg => !!pkg.scripts.dev)
                },
                {
                    name: '11.3: Build script exists',
                    test: () => fetch('package.json').then(r => r.json()).then(pkg => !!pkg.scripts.build)
                },
                {
                    name: '11.4: Development HTML uses /src/main.tsx',
                    test: () => fetch('newtab.html').then(r => r.text()).then(html => html.includes('/src/main.tsx'))
                },
                {
                    name: '11.5: React plugin configured',
                    test: () => fetch('vite.config.ts').then(r => r.text()).catch(() => fetch('vite.config.js').then(r => r.text())).then(config => config.includes('@vitejs/plugin-react'))
                }
            ];

            return Promise.all(tests.map(async t => {
                try {
                    const pass = await t.test();
                    results.feature11.push({ name: t.name, pass });
                    return { name: t.name, pass };
                } catch (e) {
                    results.feature11.push({ name: t.name, pass: false });
                    return { name: t.name, pass: false, error: e.message };
                }
            }));
        }

        // Feature #12: Build Process
        function testBuildProcess() {
            const tests = [
                {
                    name: '12.1: TypeScript compilation successful (dist exists)',
                    test: () => fetch('dist/newtab.js').then(r => r.ok).catch(() => false)
                },
                {
                    name: '12.2: Manifest v3 in dist',
                    test: () => fetch('dist/manifest.json').then(r => r.json()).then(m => m.manifest_version === 3)
                },
                {
                    name: '12.3: New tab override configured',
                    test: () => fetch('dist/manifest.json').then(r => r.json()).then(m => m.chrome_url_overrides?.newtab === 'newtab.html')
                },
                {
                    name: '12.4: Storage permission granted',
                    test: () => fetch('dist/manifest.json').then(r => r.json()).then(m => m.permissions?.includes('storage'))
                },
                {
                    name: '12.5: CSP configured',
                    test: () => fetch('dist/manifest.json').then(r => r.json()).then(m => !!m.content_security_policy)
                },
                {
                    name: '12.6: Icons present in dist',
                    test: () => Promise.all([
                        fetch('dist/icon16.png').then(r => r.ok).catch(() => false),
                        fetch('dist/icon48.png').then(r => r.ok).catch(() => false),
                        fetch('dist/icon128.png').then(r => r.ok).catch(() => false)
                    ]).then(results => results.every(r => r))
                },
                {
                    name: '12.7: Bundle minified (check newline ratio)',
                    test: () => fetch('dist/newtab.js').then(r => r.text()).then(code => {
                        const lineCount = code.split('\n').length;
                        const charCount = code.length;
                        const ratio = charCount / lineCount;
                        return ratio > 1000; // Highly compressed code
                    })
                },
                {
                    name: '12.8: CSS bundled and minified',
                    test: () => fetch('dist/newtab.css').then(r => r.text()).then(css => css.length > 0 && css.includes('css'))
                }
            ];

            return Promise.all(tests.map(async t => {
                try {
                    const pass = await t.test();
                    results.feature12.push({ name: t.name, pass });
                    return { name: t.name, pass };
                } catch (e) {
                    results.feature12.push({ name: t.name, pass: false });
                    return { name: t.name, pass: false, error: e.message };
                }
            }));
        }

        function renderResults() {
            const total = results.feature8.length + results.feature11.length + results.feature12.length;
            const passing = [...results.feature8, ...results.feature11, ...results.feature12].filter(r => r.pass).length;

            document.getElementById('results').innerHTML = `
                <div class="test-section ${passing === total ? 'test-pass' : 'test-fail'}">
                    <h2>Overall Results</h2>
                    <p><strong>Total Tests:</strong> ${total}</p>
                    <p><strong>Passing:</strong> ${passing}</p>
                    <p><strong>Failing:</strong> ${total - passing}</p>
                    <p><strong>Pass Rate:</strong> ${((passing / total) * 100).toFixed(1)}%</p>
                </div>
            `;

            renderTestSection('react-tests', results.feature8);
            renderTestSection('hmr-tests', results.feature11);
            renderTestSection('build-tests', results.feature12);
        }

        function renderTestSection(elementId, tests) {
            const container = document.getElementById(elementId);
            const allPass = tests.every(t => t.pass);

            container.innerHTML = `
                <div class="${allPass ? 'test-pass' : 'test-fail'}" style="padding: 10px; border-radius: 4px;">
                    ${tests.map(t => `
                        <div class="check-item ${t.pass ? 'check-pass' : 'check-fail'}">
                            ${t.name}
                            ${t.error ? `<br><small style="color: red;">Error: ${t.error}</small>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function loadExtension() {
            document.getElementById('extension-frame').src = 'dist/newtab.html';
        }

        function checkConsole() {
            const iframe = document.getElementById('extension-frame');
            try {
                // Cannot access cross-origin console, but we can report limitations
                document.getElementById('console-output').innerHTML = `
                    <div class="test-section">
                        <strong>Console Check:</strong><br>
                        Due to browser security, cannot access iframe console directly.<br>
                        Manual verification: Open DevTools on the iframe above to check for console errors.
                    </div>
                `;
            } catch (e) {
                document.getElementById('console-output').innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }

        function testReactMount() {
            const iframe = document.getElementById('extension-frame');
            iframe.onload = () => {
                try {
                    const root = iframe.contentWindow.document.getElementById('root');
                    if (root && root.children.length > 0) {
                        document.getElementById('console-output').innerHTML = `
                            <div class="test-section test-pass">
                                <strong>CHECK PASS React Mount Test:</strong> Root element has content (${root.children.length} children)
                            </div>
                        `;
                    } else {
                        document.getElementById('console-output').innerHTML = `
                            <div class="test-section test-fail">
                                <strong>CHECK FAIL React Mount Test:</strong> Root element is empty or not found
                            </div>
                        `;
                    }
                } catch (e) {
                    document.getElementById('console-output').innerHTML = `
                        <div class="test-section test-fail">
                            <strong>CHECK FAIL React Mount Test:</strong> Cannot access iframe content (same-origin restriction)
                        </div>
                    `;
                }
            };
            iframe.src = 'dist/newtab.html';
        }

        // Run all tests on load
        async function runAllTests() {
            await Promise.all([
                testReactInitialization(),
                testHMRConfiguration(),
                testBuildProcess()
            ]);
            renderResults();
        }

        runAllTests();
    </script>
</body>
</html>
