<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Regression Tests</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.danger {
            background-color: #dc3545;
        }
        button.danger:hover {
            background-color: #c82333;
        }
        #log {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Feature Regression Tests</h1>
    <p>Testing features 25, 26, and 27</p>

    <div class="test-section">
        <h2>Test Controls</h2>
        <button onclick="runAllTests()">Run All Tests</button>
        <button class="danger" onclick="clearAllStorage()">Clear All Storage</button>
        <button onclick="showStorageState()">Show Current Storage</button>
    </div>

    <div class="test-section">
        <h2>Feature 25: Default Page Creation on First Load</h2>
        <div id="feature25-results"></div>
        <button onclick="testFeature25()">Test Feature 25</button>
    </div>

    <div class="test-section">
        <h2>Feature 26: Create New Pages</h2>
        <div id="feature26-results"></div>
        <button onclick="testFeature26()">Test Feature 26</button>
    </div>

    <div class="test-section">
        <h2>Feature 27: Page Persistence in Storage</h2>
        <div id="feature27-results"></div>
        <button onclick="testFeature27()">Test Feature 27</button>
    </div>

    <div class="test-section">
        <h2>Log</h2>
        <div id="log"></div>
    </div>

    <script type="module">
        // Import the storage functions
        const log = document.getElementById('log');

        function logMessage(msg) {
            const timestamp = new Date().toISOString();
            log.textContent += `[${timestamp}] ${msg}\n`;
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }

        function addResult(elementId, message, passed) {
            const container = document.getElementById(elementId);
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'pass' : 'fail'}`;
            div.textContent = (passed ? '✓ ' : '✗ ') + message;
            container.appendChild(div);
        }

        function addInfo(elementId, message) {
            const container = document.getElementById(elementId);
            const div = document.createElement('div');
            div.className = 'test-result info';
            div.textContent = 'ℹ ' + message;
            container.appendChild(div);
        }

        function clearResults(elementId) {
            document.getElementById(elementId).innerHTML = '';
        }

        // Storage helpers (mimicking the actual app code)
        function getFromStorage(keys) {
            return new Promise((resolve) => {
                try {
                    chrome.storage.local.get(keys, (result) => {
                        if (chrome.runtime.lastError) {
                            logMessage('Chrome storage get error: ' + chrome.runtime.lastError.message);
                            resolve({ data: null, error: chrome.runtime.lastError.message });
                            return;
                        }

                        let data = null;
                        if (typeof keys === 'string') {
                            data = result[keys] ?? null;
                        } else {
                            data = result;
                        }
                        resolve({ data, error: null });
                    });
                } catch (error) {
                    const errorMessage = error instanceof Error ? error.message : 'Unknown error';
                    logMessage('Chrome storage get exception: ' + errorMessage);
                    resolve({ data: null, error: errorMessage });
                }
            });
        }

        function setToStorage(items) {
            return new Promise((resolve) => {
                try {
                    chrome.storage.local.set(items, () => {
                        if (chrome.runtime.lastError) {
                            logMessage('Chrome storage set error: ' + chrome.runtime.lastError.message);
                            resolve({ success: false, error: chrome.runtime.lastError.message });
                            return;
                        }
                        logMessage('Storage write verified: ' + JSON.stringify(Object.keys(items)));
                        resolve({ success: true, error: null });
                    });
                } catch (error) {
                    const errorMessage = error instanceof Error ? error.message : 'Unknown error';
                    logMessage('Chrome storage set exception: ' + errorMessage);
                    resolve({ success: false, error: errorMessage });
                }
            });
        }

        function clearStorage() {
            return new Promise((resolve) => {
                try {
                    chrome.storage.local.clear(() => {
                        if (chrome.runtime.lastError) {
                            logMessage('Chrome storage clear error: ' + chrome.runtime.lastError.message);
                            resolve({ success: false, error: chrome.runtime.lastError.message });
                            return;
                        }
                        logMessage('All storage cleared');
                        resolve({ success: true, error: null });
                    });
                } catch (error) {
                    const errorMessage = error instanceof Error ? error.message : 'Unknown error';
                    logMessage('Chrome storage clear exception: ' + errorMessage);
                    resolve({ success: false, error: errorMessage });
                }
            });
        }

        async function clearAllStorage() {
            logMessage('=== Clearing all storage ===');
            const result = await clearStorage();
            if (result.success) {
                logMessage('✓ Storage cleared successfully');
            } else {
                logMessage('✗ Failed to clear storage: ' + result.error);
            }
        }

        async function showStorageState() {
            logMessage('=== Current Storage State ===');
            const result = await getFromStorage(null);
            if (result.error) {
                logMessage('✗ Error reading storage: ' + result.error);
            } else {
                logMessage('Storage contents: ' + JSON.stringify(result.data, null, 2));
            }
        }

        // Feature 25: Default page creation on first load
        async function testFeature25() {
            clearResults('feature25-results');
            logMessage('=== Testing Feature 25: Default Page Creation ===');

            let allPassed = true;

            // Step 1: Clear all extension data
            logMessage('Step 1: Clearing all extension data...');
            const clearResult = await clearStorage();
            if (clearResult.success) {
                addResult('feature25-results', 'Step 1: Cleared all extension data', true);
            } else {
                addResult('feature25-results', 'Step 1: Failed to clear storage - ' + clearResult.error, false);
                allPassed = false;
            }

            // Wait a moment
            await new Promise(resolve => setTimeout(resolve, 100));

            // Step 2: Simulate extension load (create default page)
            logMessage('Step 2: Simulating extension initialization...');
            const result = await getFromStorage('pages');
            const pages = result.data ?? [];

            if (pages.length === 0) {
                // Create default page (mimicking App.tsx logic)
                const defaultPage = {
                    id: 'page-' + Date.now(),
                    name: 'My Page',
                    order: 0,
                    widgets: [],
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString(),
                };

                const newPages = [defaultPage];
                const saveResult = await setToStorage({ pages: newPages });

                if (saveResult.success) {
                    logMessage('✓ Created default page: ' + defaultPage.id);
                    addResult('feature25-results', 'Step 2: Extension reload simulated, default page created', true);
                } else {
                    logMessage('✗ Failed to save default page: ' + saveResult.error);
                    addResult('feature25-results', 'Step 2: Failed to save default page - ' + saveResult.error, false);
                    allPassed = false;
                }
            } else {
                addInfo('feature25-results', 'Step 2: Pages already exist, skipping creation');
            }

            // Step 3 & 4: Verify one default page exists
            logMessage('Step 3-4: Verifying default page exists...');
            const verifyResult = await getFromStorage('pages');
            const verifiedPages = verifyResult.data ?? [];

            if (verifiedPages.length === 1) {
                addResult('feature25-results', 'Step 3-4: One default page exists', true);
            } else {
                addResult('feature25-results', `Step 3-4: Expected 1 page, found ${verifiedPages.length}`, false);
                allPassed = false;
            }

            // Step 5: Verify default page has a name
            if (verifiedPages.length > 0 && verifiedPages[0].name === 'My Page') {
                addResult('feature25-results', 'Step 5: Default page has name "My Page"', true);
                logMessage('✓ Default page name: ' + verifiedPages[0].name);
            } else {
                addResult('feature25-results', 'Step 5: Default page does not have expected name', false);
                allPassed = false;
            }

            // Step 6: Verify default page is empty
            if (verifiedPages.length > 0 && Array.isArray(verifiedPages[0].widgets) && verifiedPages[0].widgets.length === 0) {
                addResult('feature25-results', 'Step 6: Default page is empty (no widgets)', true);
                logMessage('✓ Default page is empty');
            } else {
                addResult('feature25-results', 'Step 6: Default page is not empty', false);
                allPassed = false;
            }

            // Step 7: Verify default page is active (this would be determined by app state)
            addInfo('feature25-results', 'Step 7: Default page would be active (app state)');

            if (allPassed) {
                logMessage('✓ Feature 25: ALL TESTS PASSED');
                addResult('feature25-results', 'Feature 25: PASSED', true);
            } else {
                logMessage('✗ Feature 25: SOME TESTS FAILED');
                addResult('feature25-results', 'Feature 25: FAILED', false);
            }

            return allPassed;
        }

        // Feature 26: Create new pages
        async function testFeature26() {
            clearResults('feature26-results');
            logMessage('=== Testing Feature 26: Create New Pages ===');

            let allPassed = true;

            // First ensure we have at least one page
            let pagesResult = await getFromStorage('pages');
            let pages = pagesResult.data ?? [];

            if (pages.length === 0) {
                // Create initial page
                const defaultPage = {
                    id: 'page-' + Date.now(),
                    name: 'My Page',
                    order: 0,
                    widgets: [],
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString(),
                };
                pages = [defaultPage];
                await setToStorage({ pages });
                logMessage('Created initial page for testing');
            }

            const initialCount = pages.length;
            logMessage(`Initial page count: ${initialCount}`);

            // Step 1: Click the 'Add Page' button (simulate)
            logMessage('Step 1: Simulating click on "Add Page" button...');
            const newPage = {
                id: 'page-' + Date.now(),
                name: 'New Page',
                order: initialCount,
                widgets: [],
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString(),
            };

            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];
            pages.push(newPage);

            const saveResult = await setToStorage({ pages });
            if (saveResult.success) {
                addResult('feature26-results', 'Step 1: "Add Page" button clicked successfully', true);
                logMessage('✓ New page created: ' + newPage.id);
            } else {
                addResult('feature26-results', 'Step 1: Failed to create page - ' + saveResult.error, false);
                allPassed = false;
            }

            // Step 2: Verify new page is created
            logMessage('Step 2: Verifying new page is created...');
            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];

            if (pages.length === initialCount + 1) {
                addResult('feature26-results', 'Step 2: New page is created', true);
            } else {
                addResult('feature26-results', `Step 2: Expected ${initialCount + 1} pages, found ${pages.length}`, false);
                allPassed = false;
            }

            // Step 3: Verify page appears in navigation
            const newPageInList = pages.find(p => p.id === newPage.id);
            if (newPageInList) {
                addResult('feature26-results', 'Step 3: Page appears in tab navigation', true);
            } else {
                addResult('feature26-results', 'Step 3: Page not found in list', false);
                allPassed = false;
            }

            // Step 4: Verify page has default name
            if (newPageInList && newPageInList.name === 'New Page') {
                addResult('feature26-results', 'Step 4: Page has default name "New Page"', true);
            } else {
                addResult('feature26-results', 'Step 4: Page does not have expected name', false);
                allPassed = false;
            }

            // Step 5: Verify page is empty
            if (newPageInList && Array.isArray(newPageInList.widgets) && newPageInList.widgets.length === 0) {
                addResult('feature26-results', 'Step 5: Page is empty (no widgets)', true);
            } else {
                addResult('feature26-results', 'Step 5: Page is not empty', false);
                allPassed = false;
            }

            // Step 6: Check that new page is automatically selected
            addInfo('feature26-results', 'Step 6: New page would be automatically selected (app state)');

            // Step 7: Verify page is saved to storage
            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];
            const savedPage = pages.find(p => p.id === newPage.id);

            if (savedPage && JSON.stringify(savedPage) === JSON.stringify(newPage)) {
                addResult('feature26-results', 'Step 7: Page is saved to storage', true);
            } else {
                addResult('feature26-results', 'Step 7: Page not properly saved to storage', false);
                allPassed = false;
            }

            if (allPassed) {
                logMessage('✓ Feature 26: ALL TESTS PASSED');
                addResult('feature26-results', 'Feature 26: PASSED', true);
            } else {
                logMessage('✗ Feature 26: SOME TESTS FAILED');
                addResult('feature26-results', 'Feature 26: FAILED', false);
            }

            return allPassed;
        }

        // Feature 27: Page persistence in storage
        async function testFeature27() {
            clearResults('feature27-results');
            logMessage('=== Testing Feature 27: Page Persistence ===');

            let allPassed = true;
            const uniqueName = 'PAGE_PERSIST_' + Date.now();

            // Step 1: Create a test page with unique name
            logMessage(`Step 1: Creating test page "${uniqueName}"...`);
            const testPage = {
                id: 'page-' + Date.now(),
                name: uniqueName,
                order: 99,
                widgets: [],
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString(),
            };

            let pagesResult = await getFromStorage('pages');
            let pages = pagesResult.data ?? [];
            pages.push(testPage);

            const saveResult = await setToStorage({ pages });
            if (saveResult.success) {
                addResult('feature27-results', 'Step 1: Created test page "' + uniqueName + '"', true);
                logMessage('✓ Test page created: ' + testPage.id);
            } else {
                addResult('feature27-results', 'Step 1: Failed to create test page - ' + saveResult.error, false);
                allPassed = false;
            }

            // Step 2: Verify page appears in UI (storage)
            logMessage('Step 2: Verifying page appears in storage...');
            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];
            const pageInStorage = pages.find(p => p.name === uniqueName);

            if (pageInStorage) {
                addResult('feature27-results', 'Step 2: Page appears in storage/UI', true);
            } else {
                addResult('feature27-results', 'Step 2: Page not found in storage', false);
                allPassed = false;
            }

            // Step 3: Simulate extension reload (read from storage again)
            logMessage('Step 3: Simulating extension reload...');
            await new Promise(resolve => setTimeout(resolve, 100));

            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];
            const pageAfterReload = pages.find(p => p.name === uniqueName);

            if (pageAfterReload) {
                addResult('feature27-results', 'Step 3: Page exists after extension reload', true);
                logMessage('✓ Page persisted through reload');
            } else {
                addResult('feature27-results', 'Step 3: Page lost after reload', false);
                allPassed = false;
            }

            // Step 4: Verify unique name page still exists
            if (pageAfterReload && pageAfterReload.name === uniqueName) {
                addResult('feature27-results', 'Step 4: Page "' + uniqueName + '" still exists', true);
            } else {
                addResult('feature27-results', 'Step 4: Page name does not match', false);
                allPassed = false;
            }

            // Step 5: Close browser and reopen (simulated by another storage read)
            logMessage('Step 5: Simulating browser close/reopen...');
            await new Promise(resolve => setTimeout(resolve, 100));

            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];
            const pageAfterReopen = pages.find(p => p.name === uniqueName);

            if (pageAfterReopen) {
                addResult('feature27-results', 'Step 5: Page exists after browser reopen', true);
                logMessage('✓ Page persisted through browser reopen');
            } else {
                addResult('feature27-results', 'Step 5: Page lost after browser reopen', false);
                allPassed = false;
            }

            // Step 6: Verify page still exists
            if (pageAfterReopen) {
                addResult('feature27-results', 'Step 6: Page still exists', true);
            } else {
                addResult('feature27-results', 'Step 6: Page no longer exists', false);
                allPassed = false;
            }

            // Step 7: Clean up test data
            logMessage('Step 7: Cleaning up test data...');
            pagesResult = await getFromStorage('pages');
            pages = pagesResult.data ?? [];
            const filteredPages = pages.filter(p => p.name !== uniqueName);

            const cleanupResult = await setToStorage({ pages: filteredPages });
            if (cleanupResult.success) {
                addResult('feature27-results', 'Step 7: Test data cleaned up', true);
                logMessage('✓ Cleanup complete');
            } else {
                addResult('feature27-results', 'Step 7: Cleanup failed - ' + cleanupResult.error, false);
                allPassed = false;
            }

            if (allPassed) {
                logMessage('✓ Feature 27: ALL TESTS PASSED');
                addResult('feature27-results', 'Feature 27: PASSED', true);
            } else {
                logMessage('✗ Feature 27: SOME TESTS FAILED');
                addResult('feature27-results', 'Feature 27: FAILED', false);
            }

            return allPassed;
        }

        async function runAllTests() {
            logMessage('========================================');
            logMessage('Running All Feature Regression Tests');
            logMessage('========================================');

            const f25 = await testFeature25();
            await new Promise(resolve => setTimeout(resolve, 500));

            const f26 = await testFeature26();
            await new Promise(resolve => setTimeout(resolve, 500));

            const f27 = await testFeature27();

            logMessage('========================================');
            logMessage('FINAL RESULTS:');
            logMessage(`Feature 25: ${f25 ? 'PASSED ✓' : 'FAILED ✗'}`);
            logMessage(`Feature 26: ${f26 ? 'PASSED ✓' : 'FAILED ✗'}`);
            logMessage(`Feature 27: ${f27 ? 'PASSED ✓' : 'FAILED ✗'}`);
            logMessage('========================================');

            if (f25 && f26 && f27) {
                logMessage('ALL FEATURES PASSED ✓');
            } else {
                logMessage('SOME FEATURES FAILED ✗');
            }
        }

        // Expose functions to window
        window.testFeature25 = testFeature25;
        window.testFeature26 = testFeature26;
        window.testFeature27 = testFeature27;
        window.runAllTests = runAllTests;
        window.clearAllStorage = clearAllStorage;
        window.showStorageState = showStorageState;

        // Check if Chrome Storage API is available
        if (typeof chrome !== 'undefined' && chrome.storage) {
            logMessage('✓ Chrome Storage API is available');
        } else {
            logMessage('✗ Chrome Storage API is NOT available - this page must be loaded as a Chrome extension');
            addInfo('feature25-results', 'This test page must be loaded as a Chrome extension to access Chrome Storage API');
        }
    </script>
</body>
</html>
