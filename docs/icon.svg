<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>

  <!-- BL monogram -->
  <text x="64" y="85" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">BL</text>

  <!-- Small launchpad rocket icon at bottom -->
  <path d="M64 95 L64 100 M58 98 L64 95 L70 98" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
